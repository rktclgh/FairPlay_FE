name: frontend-ci

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        timeout-minutes: 10
        run: npm run build

      - name: Guard Cloudflare-blocked asset names
        run: |
          set -euo pipefail
          if grep -R '/assets/vendor-' dist/index.html dist/assets 2>/dev/null; then
            echo "The deployed Cloudflare zone blocks /assets/vendor-*.js. Rename the chunk before merging."
            exit 1
          fi

      - name: Typecheck changed files
        timeout-minutes: 5
        run: npm run typecheck:changed

      - name: Lint changed files
        timeout-minutes: 5
        run: npm run lint:changed
